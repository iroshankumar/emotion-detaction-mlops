name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install basic dependencies
        run: |
          pip install flask dvc mlflow

      - name: Install project requirements
        run: |
          pip install -r requirements.txt || true

      - name: Verify important files
        run: |
          test -f app.py
          test -f requirements.txt
          test -d templates
          test -d src
          test -f dvc.yaml || true
          test -f params.yaml || true
          test -f main.py || true

      - name: Check Python imports
        run: |
          python -c "import flask; print('Flask OK')"
          python -c "import mlflow; print('MLflow OK')"
          python -c "import dvc; print('DVC OK')"

      - name: Validate DVC
        run: |
          dvc --version
          dvc status || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t iroshann/emotiondetaction .

      - name: Push Docker image to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push iroshann/emotiondetaction